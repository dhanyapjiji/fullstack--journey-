<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Generatort</title>
    <link rel="stylesheet" href="otp1.css">
</head>
<body>
    <div class="main">
        <h1 id="hed">OTP Generator | Validator</h1>
       <div class="gen-otp">
          <button class="bt1" id="bt1" onclick="generateOtp()">Generate OTP</button>
          <span id="otp"></span><br><br>
       </div>
       <div class="vali-otp">
         <input type="text" id="text" placeholder="Enter OTP"><br><br>
         <button class="bt2" id="bt2" onclick="validateOtp()">Validate OTP</button>
         <span id="valid"></span>
        </div>
        <div id="timer"></div>
    </div>
    <script src="otp1.js"></script>
</body>
</html>
