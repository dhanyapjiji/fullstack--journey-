<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="formvalidation.css">
</head>
<body>
    <div class="main">
      
        <div class="container">
            <div class="container1">
            <form onclick="return validate(event)" id="form1" value="Submit">
              
                <h1 id="hed">Login</h1>
                <div class="name1">
                <label for="t1">Name </label>
                 <input type="text" id="t1" placeholder="User Name" required>
                 <span id="nameError" class="error-text"></span>
                </div>
                <div class="name1">
                <label for="t2">Email </label>
                <input type="email" id="t2" placeholder="Enter your Email" required>
                <span id="emailError" class="error-text"></span>
                </div>
                <div class="name1">
                 <label for="t3">Phone Number </label>
                 <input type="number" id="t3" placeholder="Enter your Phone Number" required>
                 <span id="phonError" class="error-text"></span>
                </div>
                 <div class="name1">
                        <label for="t4">Password </label>
                        <input type="password" id="t4" placeholder="Enter your password"required>
                        <span id="passError" class="error-text"></span>
                </div>
                <div class="name1">
                    <label for="t5">Confirm Password</label>
                    <div class="check-box">
                    <input type="password" id="t5" placeholder="Enter your password again" required>
                    <input type="checkbox" id="togglePass" onclick="togglePassword()"> Show Password
                    </div>
                    <span id="repassError" class="error-text"></span>
                </div>
                <div class="bt1">
                    <button id="bt1" onclick="validate(event)">Submit</button>
                </div>
                </div>
            </form>

        </div>
    </div>
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon">✔</div>
            <h2>Registration Successful!</h2>
            <p>You are Successfully logedin. Your account has been created.</p>
            <button onclick="closeModal()">Great!</button>
        </div>
    </div>
    <script src="formvalidation.js"></script>
</body>
</html>
